<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
        .admin-header h1 { margin: 0; color: #0f172a; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; font-weight: 600; color: #475569; }
        tr:hover { background-color: #f1f5f9; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
        .btn-danger:hover { background: #dc2828; }
        .badge { background: #2563eb; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="top-row" style="padding: 15px 20px; background: white; border-bottom: 1px solid #e2e8f0;">
        <a class="back" href="menu.html">← Volver al Menú</a>
    </div>

    <div class="admin-container" id="admin-content" style="display: none;">
        <div class="admin-header">
            <h1>Panel de Administración</h1>
            <div class="badge">Modo Admin Activo</div>
        </div>

        <h3>Gestión del Foro</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="admin-topics-list">
                <tr><td colspan="5" style="text-align:center;">Cargando temas...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="admin-error" style="display:none; text-align:center; padding: 50px; color: #ef4444; font-weight: bold;">
        <h2>Acceso Denegado</h2>
        <p>No tienes permisos de administrador para ver esta página.</p>
        <a href="menu.html" class="btn">Regresar al menú</a>
    </div>

<script src="js/app.js"></script>
</body>
</html>
