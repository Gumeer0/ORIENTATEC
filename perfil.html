<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Orientación Vocacional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        .profile-info h2 { margin: 0; color: #1e293b; }
        .profile-info p { margin: 5px 0 0; color: #64748b; }
        .section-title { font-size: 1.25rem; color: #0f172a; margin-bottom: 15px; border-left: 4px solid #2563eb; padding-left: 10px; }
        .favorites-list, .posts-list { list-style: none; padding: 0; margin: 0 0 30px 0; }
        .favorites-list li, .posts-list li { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-remove { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-remove:hover { background: #dc2828; }
        .empty-state { color: #94a3b8; font-style: italic; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="top-row" style="padding: 20px; background: white; border-bottom: 1px solid #e2e8f0;">
        <a class="back" href="menu.html">← Volver al Menú</a>
    </div>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar-letter">?</div>
            <img id="profile-avatar-img" class="profile-avatar" src="" alt="Avatar" style="display:none;">
            <div class="profile-info">
                <h2 id="profile-name">Cargando...</h2>
                <p id="profile-email"></p>
                <p id="profile-test-result" style="margin-top: 10px; font-weight: 500; color: #2563eb;"></p>
            </div>
        </div>

        <h3 class="section-title">⭐ Mis Favoritos (Carreras y Universidades)</h3>
        <ul class="favorites-list" id="favorites-list">
            <div class="empty-state">Cargando favoritos...</div>
        </ul>

        <h3 class="section-title">📝 Mis Temas en el Foro</h3>
        <ul class="posts-list" id="posts-list">
            <div class="empty-state">Cargando temas...</div>
        </ul>
    </div>

<script src="js/app.js"></script>
</body>
</html>
